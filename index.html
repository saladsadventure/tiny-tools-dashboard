<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Tools Dashboard</title>
  <style>
    :root{--bg:#f7f1e8;--card:#efe3d0;--accent:#7c4a25;--text:#30261f;--soft:#fffaf2;--sand:#d8c3a5}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#fffaf2,#f7f1e8 45%,#ead8bf);color:var(--text)}.app{width:min(1120px,calc(100% - 32px));margin:auto;padding:36px 0}.hero{background:rgba(239,227,208,.82);border:1px solid rgba(124,74,37,.12);border-radius:32px;padding:34px;box-shadow:0 20px 60px rgba(48,38,31,.08);margin-bottom:24px}.badge{display:inline-flex;gap:8px;align-items:center;color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:.14em;font-size:.76rem}.hero h1{font-family:Georgia,serif;font-weight:400;font-size:clamp(2.2rem,6vw,5rem);line-height:1.02;margin:16px 0}.hero p{font-size:1.08rem;max-width:720px;line-height:1.7;opacity:.78}.layout{display:grid;grid-template-columns:310px 1fr;gap:22px}.sidebar,.panel{background:rgba(239,227,208,.84);border:1px solid rgba(124,74,37,.12);border-radius:28px;padding:20px;box-shadow:0 20px 60px rgba(48,38,31,.07)}.sidebar{display:grid;gap:12px;align-content:start}.tool-card{border:0;border-radius:22px;background:rgba(255,250,242,.62);padding:16px;text-align:left;cursor:pointer;color:var(--text)}.tool-card.active{outline:2px solid rgba(124,74,37,.3);background:#fffaf2}.tool-card h3{margin:0 0 6px;font-size:1rem}.tool-card p{margin:0;line-height:1.45;font-size:.86rem;opacity:.68}.panel-head{display:flex;gap:14px;align-items:center;margin-bottom:22px}.panel h2{font-family:Georgia,serif;font-size:2rem;font-weight:400;margin:0}.panel-head p{margin:4px 0 0;opacity:.68}.icon-box{width:46px;height:46px;border-radius:16px;background:var(--sand);display:grid;place-items:center;font-size:1.3rem}label{display:block;margin:14px 0 8px;font-weight:700;font-size:.9rem;color:rgba(48,38,31,.74)}input,textarea,select{width:100%;border:0;border-radius:18px;background:var(--soft);padding:14px 15px;font:inherit;color:var(--text);outline:0}textarea{resize:vertical}.btn{border:0;border-radius:18px;background:var(--accent);color:#fff;font-weight:800;padding:12px 15px;cursor:pointer;margin-top:14px}.btn.secondary{background:#d8c3a5;color:var(--text)}.actions{display:flex;gap:10px;flex-wrap:wrap}.output{background:rgba(255,250,242,.7);border-radius:22px;padding:18px;margin-top:18px}.kicker{text-transform:uppercase;letter-spacing:.14em;color:var(--accent);font-size:.72rem;font-weight:900;margin:0 0 8px}.result{font-family:Georgia,serif;font-size:1.8rem;margin:0;word-break:break-word}.note{font-size:.86rem;opacity:.64;line-height:1.6}.timer{text-align:center}.time{font-family:Georgia,serif;font-size:5rem;margin:20px 0}.qr-box{display:grid;place-items:center;min-height:260px;background:#fffaf2;border-radius:24px;margin-top:18px}.qr-box img{max-width:240px;width:100%;height:auto}.currency-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.footer{text-align:center;opacity:.55;margin-top:24px}@media(max-width:840px){.layout{grid-template-columns:1fr}.currency-grid{grid-template-columns:1fr}.hero{padding:24px}.time{font-size:3.8rem}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="badge">✦ Personal Tools Dashboard</div>
      <h1>All your daily tiny tools in one calm place.</h1>
      <p>Useful tiny tools for everyday life: short link demo, Pomodoro timer, QR code generator and currency converter.</p>
    </section>

    <section class="layout">
      <aside class="sidebar">
        <button class="tool-card active" data-tool="short"><h3>🔗 Short Link</h3><p>Generate a local demo short link.</p></button>
        <button class="tool-card" data-tool="timer"><h3>⏱ Pomodoro Timer</h3><p>25 minutes focus, 5 minutes rest.</p></button>
        <button class="tool-card" data-tool="qr"><h3>▦ QR Code</h3><p>Create a QR code from text or URL.</p></button>
        <button class="tool-card" data-tool="currency"><h3>💷 Currency Converter</h3><p>Convert with rough planning rates.</p></button>
      </aside>

      <section class="panel">
        <div class="panel-head"><div class="icon-box" id="panelIcon">🔗</div><div><h2 id="panelTitle">Short Link</h2><p id="panelDesc">Generate a local demo short link.</p></div></div>
        <div id="toolArea"></div>
      </section>
    </section>

    <p class="footer">Tiny Tools Dashboard · static GitHub Pages version</p>
  </main>

  <script>
    const toolArea = document.getElementById('toolArea');
    const title = document.getElementById('panelTitle');
    const desc = document.getElementById('panelDesc');
    const icon = document.getElementById('panelIcon');
    const rates = {GBP:1,HKD:10.2,USD:1.32,EUR:1.14,JPY:200,CNY:9.4,TWD:40.5,AUD:2.02,CAD:1.84,SGD:1.7};
    const meta = {
      short:['🔗','Short Link','Generate a local demo short link.'], timer:['⏱','Pomodoro Timer','25 minutes focus, 5 minutes rest.'], qr:['▦','QR Code','Create a QR code from text or URL.'], currency:['💷','Currency Converter','Convert with rough planning rates.']
    };
    function copyText(v){navigator.clipboard?.writeText(v)}
    function setTool(name){document.querySelectorAll('.tool-card').forEach(b=>b.classList.toggle('active',b.dataset.tool===name)); icon.textContent=meta[name][0]; title.textContent=meta[name][1]; desc.textContent=meta[name][2]; render[name]();}
    const render={
      short(){toolArea.innerHTML=`<label>Long URL</label><input id="longUrl" placeholder="Paste your long link here..."><div class="output"><p class="kicker">Generated short link</p><p class="result" id="shortOut">Your short link will appear here</p><div class="actions"><button class="btn" id="copyShort">Copy</button></div></div><p class="note">MVP note: this is a local demo short link, not a real redirect service.</p>`; const input=document.getElementById('longUrl'), out=document.getElementById('shortOut'); input.oninput=()=>{const clean=input.value.trim(); out.textContent=clean?'https://tt.ly/'+btoa(unescape(encodeURIComponent(clean))).replace(/[+/=]/g,'').slice(0,8).toLowerCase():'Your short link will appear here'}; document.getElementById('copyShort').onclick=()=>copyText(out.textContent);},
      timer(){toolArea.innerHTML=`<div class="timer"><p class="kicker" id="mode">focus</p><div class="time" id="time">25:00</div><div class="actions" style="justify-content:center"><button class="btn" id="start">Start</button><button class="btn secondary" id="reset">Reset</button></div><p class="note">A simple calm timer for one focused session.</p></div>`; let s=1500,running=false,id; const time=document.getElementById('time'), start=document.getElementById('start'); const draw=()=>{time.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}; start.onclick=()=>{running=!running; start.textContent=running?'Pause':'Start'; if(running){id=setInterval(()=>{s=Math.max(0,s-1);draw(); if(s===0){clearInterval(id);running=false;start.textContent='Start'}},1000)}else clearInterval(id)}; document.getElementById('reset').onclick=()=>{clearInterval(id);running=false;s=1500;start.textContent='Start';draw()};},
      qr(){toolArea.innerHTML=`<label>Text or URL</label><textarea id="qrText" rows="6" placeholder="Type text or paste a URL..."></textarea><div class="qr-box" id="qrBox"><p class="note">QR preview will appear here.</p></div><p class="note">Uses a public QR image endpoint. Avoid putting sensitive private text here.</p>`; document.getElementById('qrText').oninput=e=>{const v=e.target.value.trim(); document.getElementById('qrBox').innerHTML=v?`<img alt="QR code" src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(v)}">`:'<p class="note">QR preview will appear here.</p>'};},
      currency(){toolArea.innerHTML=`<div class="currency-grid"><div><label>Amount</label><input id="amount" value="100"></div><div><label>From</label><select id="from">${Object.keys(rates).map(c=>`<option>${c}</option>`).join('')}</select></div><div><label>To</label><select id="to">${Object.keys(rates).map(c=>`<option ${c==='HKD'?'selected':''}>${c}</option>`).join('')}</select></div></div><div class="output"><p class="kicker">Converted amount</p><p class="result" id="converted">—</p><p class="note">Fallback estimates for rough planning only.</p></div>`; const calc=()=>{const a=Number(document.getElementById('amount').value)||0, f=document.getElementById('from').value, t=document.getElementById('to').value; document.getElementById('converted').textContent=(a*rates[t]/rates[f]).toLocaleString('en-GB',{maximumFractionDigits:2})+' '+t}; ['amount','from','to'].forEach(id=>document.getElementById(id).oninput=calc); calc();}
    };
    document.querySelectorAll('.tool-card').forEach(b=>b.onclick=()=>setTool(b.dataset.tool));
    setTool('short');
  </script>
</body>
</html>
